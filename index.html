<!DOCTYPE html>
<html lang="id">
<head>

    <title>Guangdong 4D - Auto Style</title>
    <style>

        .box { background: #1a1a1a; border-radius: 12px; padding: 30px; max-width: 550px; margin: 20px auto; }

        .number { font-size: 42px; font-weight: bold; letter-spacing: 10px; color: #ffd700; }
        button { padding: 15px 30px; font-size: 18px; background: #ffd700; color: black; border: none; border-radius: 8px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Guangdong 4D - 26 Maret 2026</h1>
    <p style="color:#aaa;">Draw hari ini (15:00 hrs)</p>

    <div class="box">
        <div class="prize-row"><span>1st Prize</span><span class="number">8057</span></div>
        <div class="prize-row"><span>2nd Prize</span><span class="number">3781</span></div>
        <div class="prize-row"><span>3rd Prize</span><span class="number">5692</span></div>
        <div class="prize-row"><span>Special Prize</span><span class="number">8901</span></div>
        <div class="prize-row"><span>Consolation Prize</span><span class="number">4384</span></div>
    </div>

    <button onclick="window.location.reload()">🔄 Update Result Sekarang</button>
    <p style="color:#888; margin-top:30px;">Result hari ini sudah keluar</p>
</body>
</html>
