<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Winning Number Caption - JuaraTogel</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f0f23, #1a1a2e);
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 580px;
      margin: 0 auto;
      background: rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 25px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    h1 {
      text-align: center;
      font-size: 26px;
      margin-bottom: 25px;
      background: linear-gradient(90deg, #a855f7, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .select-box {
      position: relative;
      margin-bottom: 25px;
    }

    .selected {
      padding: 15px 18px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: #1f1f2e;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      margin-top: 8px;
      max-height: 320px;
      overflow-y: auto;
      display: none;
      z-index: 10;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    .dropdown.show {
      display: block;
    }

    .pasaran-item {
      padding: 14px 18px;
      cursor: pointer;
      font-size: 15px;
    }

    .pasaran-item:hover {
      background: #a855f7;
    }

    .result-box {
      background: rgba(0,0,0,0.4);
      border-radius: 12px;
      padding: 22px;
      font-size: 17.5px;
      line-height: 1.8;
      min-height: 190px;
      margin-bottom: 15px;
      white-space: pre-line;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .copy-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(90deg, #a855f7, #ec4899);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
    }

    .copy-btn:hover {
      opacity: 0.9;
    }

    .info {
      text-align: center;
      margin-top: 12px;
      font-size: 14px;
      color: #a1a1aa;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Winning Number Caption</h1>

    <!-- Pilih Pasaran -->
    <div class="select-box">
      <div class="selected" id="selectedPasaran">
        Pilih Pasaran ▼
      </div>
      <div class="dropdown" id="dropdown">
        <!-- Daftar pasaran akan dimasukkan lewat JavaScript -->
      </div>
    </div>

    <!-- Hasil Caption -->
    <div class="result-box" id="result">
      Silakan pilih pasaran terlebih dahulu
    </div>

    <button class="copy-btn" id="copyBtn" style="display: none;">
      📋 Copy & Next Pasaran
    </button>

    <div class="info" id="status"></div>
  </div>

  <script>
    const pasaranList = [
      "KENTUCKY MID", "ROMA", "FLORIDA MID", "MONACO", "NEWYORK MID",
      "TURIN", "ITALY", "CAROLINA DAY", "CUBA", "FRANCE",
      "MADRID", "OREGON 03", "BULGARIA", "HUNGARY", "MIAMI",
      "OREGON 06", "CALIFORNIA", "FLORIDA EVE", "OREGON 09", "NEWYORK EVE",
      "KENTUCKY EVE", "CAROLINA EVE", "ECUADOR", "AUSTRIA", "CAMBODIA",
      "FOSHAN", "OREGON 12", "BULLSEYE", "CHILE", "LAOS",
      "TTM 4D-P1", "SYDNEY", "CHENGDU", "GUANGDONG", "TTM 5D-P1",
      "CHINA", "CHONGQING", "TTM 4D-P2", "PHILIPPINES", "KINGKONG P1",
      "JAPAN", "KOWLOON", "SINGAPORE", "JEJU LOTTO", "TOTO BEIJING",
      "TTM 4D-P3", "TOTO FUZHOU", "CYPRUS", "TAIWAN", "TAICHUNG",
      "MEXICO", "TTM 5D-P2", "ICELAND", "OSLO", "TTM 4D-P4",
      "BHUTAN", "HAITI", "HONGKONG", "TTM 4D-P5", "KINGKONG P2",
      "DENVER", "TORONTO", "TTM 4D-P6"
    ];

    const selectedEl = document.getElementById('selectedPasaran');
    const dropdown = document.getElementById('dropdown');
    const resultBox = document.getElementById('result');
    const copyBtn = document.getElementById('copyBtn');
    const statusDiv = document.getElementById('status');

    let currentIndex = -1;

    // Isi dropdown dengan daftar pasaran
    pasaranList.forEach((pasaran, index) => {
      const item = document.createElement('div');
      item.className = 'pasaran-item';
      item.textContent = pasaran;
      item.addEventListener('click', () => {
        currentIndex = index;
        selectedEl.textContent = pasaran + " ▼";
        showCaption(pasaran);
        dropdown.classList.remove('show');   // tutup dropdown
      });
      dropdown.appendChild(item);
    });

    // Klik untuk buka/tutup dropdown
    selectedEl.addEventListener('click', () => {
      dropdown.classList.toggle('show');
    });

    function showCaption(pasaran) {
      const caption = `𝐖𝐈𝐍𝐍𝐈𝐍𝐆 𝐍𝐔𝐌𝐁𝐄𝐑
PASARAN : ${pasaran}
SAH >>
==========================
#juaratogel #juaratogellogin
#resultjuaratogel`;

      resultBox.textContent = caption;
      copyBtn.style.display = 'block';
    }

    // Tombol Copy + Auto Next
    copyBtn.addEventListener('click', () => {
      if (currentIndex === -1) return;

      const textToCopy = resultBox.textContent;

      navigator.clipboard.writeText(textToCopy).then(() => {
        statusDiv.textContent = `✅ Copied!`;

        // Auto next
        if (currentIndex < pasaranList.length - 1) {
          currentIndex++;
          const nextPasaran = pasaranList[currentIndex];
          selectedEl.textContent = nextPasaran + " ▼";
          showCaption(nextPasaran);
        } else {
          statusDiv.textContent = '✅ Semua pasaran sudah selesai!';
          copyBtn.style.display = 'none';
        }

        setTimeout(() => statusDiv.textContent = '', 1800);
      });
    });

    // Klik di luar dropdown untuk menutup
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.select-box')) {
        dropdown.classList.remove('show');
      }
    });
  </script>
</body>
</html>
