<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Winning Number Caption - Pro</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family:'Inter',sans-serif;
  background: radial-gradient(circle at top, #1f1f3a, #0f0f23);
  color:#fff;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.container {
  width:100%;
  max-width:600px;
  background:rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  border-radius:20px;
  padding:28px;
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 20px 50px rgba(0,0,0,0.5);
  animation:fadeIn 0.6s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1; transform:translateY(0);}
}

h1 {
  text-align:center;
  margin-bottom:20px;
  font-size:26px;
  background:linear-gradient(90deg,#a855f7,#ec4899);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* SEARCH INPUT */
.search-box {
  margin-bottom:15px;
}

.search-box input {
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  outline:none;
  background:rgba(255,255,255,0.08);
  color:#fff;
  font-size:15px;
  transition:0.3s;
}

.search-box input:focus {
  background:rgba(255,255,255,0.15);
  box-shadow:0 0 0 2px #a855f7;
}

/* DROPDOWN */
.select-box {
  position:relative;
  margin-bottom:20px;
}

.selected {
  padding:14px;
  border-radius:12px;
  background:rgba(255,255,255,0.08);
  cursor:pointer;
  display:flex;
  justify-content:space-between;
}

.dropdown {
  position:absolute;
  width:100%;
  max-height:250px;
  overflow-y:auto;
  background:#1a1a2e;
  border-radius:12px;
  margin-top:8px;
  display:none;
  box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

.dropdown.show { display:block; }

.pasaran-item {
  padding:12px;
  cursor:pointer;
  transition:0.2s;
}

.pasaran-item:hover {
  background:#a855f7;
}

/* RESULT */
.result-box {
  background:rgba(0,0,0,0.4);
  border-radius:12px;
  padding:20px;
  min-height:170px;
  white-space:pre-line;
  margin-bottom:15px;
  border:1px solid rgba(255,255,255,0.1);
  animation:fadeIn 0.3s ease;
}

/* BUTTON */
.copy-btn {
  width:100%;
  padding:15px;
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  background:linear-gradient(90deg,#a855f7,#ec4899);
  transition:0.3s;
}

.copy-btn:hover {
  transform:scale(1.03);
  box-shadow:0 10px 20px rgba(168,85,247,0.4);
}

.info {
  text-align:center;
  margin-top:10px;
  font-size:13px;
  color:#aaa;
}
</style>
</head>

<body>

<div class="container">
<h1>Winning Number</h1>

<!-- SEARCH -->
<div class="search-box">
  <input type="text" id="searchInput" placeholder="Ketik nama pasaran...">
</div>

<!-- SELECT -->
<div class="select-box">
  <div class="selected" id="selectedPasaran">Pilih Pasaran ▼</div>
  <div class="dropdown" id="dropdown"></div>
</div>

<div class="result-box" id="result">
Silakan pilih pasaran
</div>

<button class="copy-btn" id="copyBtn" style="display:none;">
📋 Copy & Next
</button>

<div class="info" id="status"></div>

</div>

<script>
const pasaranList = [
"KENTUCKY MID","ROMA","FLORIDA MID","MONACO","NEWYORK MID",
"TURIN","ITALY","CAROLINA DAY","CUBA","FRANCE",
"MADRID","OREGON 03","BULGARIA","HUNGARY","MIAMI",
"OREGON 06","CALIFORNIA","FLORIDA EVE","OREGON 09","NEWYORK EVE",
"KENTUCKY EVE","CAROLINA EVE","ECUADOR","AUSTRIA","CAMBODIA",
"FOSHAN","OREGON 12","CHILE","LAOS","BULLSEYE",
"TTM 4D-P1","SYDNEY","CHENGDU","GUANGDONG","TTM 5D-P1",
"CHINA","CHONGQING","TTM 4D-P2","PHILIPPINES","KINGKONG P1",
"JAPAN","KOWLOON","SINGAPORE","JEJU LOTTO","TOTO BEIJING",
"TTM 4D-P3","TOTO FUZHOU","CYPRUS","TAIWAN","TAICHUNG",
"MEXICO","TTM 5D-P2","ICELAND","OSLO","TTM 4D-P4",
"BHUTAN","HAITI","HONGKONG","TTM 4D-P5","KINGKONG P2",
"DENVER","TORONTO","TTM 4D-P6"
];

const dropdown = document.getElementById('dropdown');
const selectedEl = document.getElementById('selectedPasaran');
const resultBox = document.getElementById('result');
const copyBtn = document.getElementById('copyBtn');
const statusDiv = document.getElementById('status');
const searchInput = document.getElementById('searchInput');

let currentIndex = -1;

// render list
function renderList(list){
  dropdown.innerHTML = '';
  list.forEach((pasaran)=>{
    const index = pasaranList.indexOf(pasaran);

    const item = document.createElement('div');
    item.className = 'pasaran-item';
    item.textContent = pasaran;

    item.onclick = () => {
      currentIndex = index;
      selectedEl.textContent = pasaran + " ▼";
      showCaption(pasaran);
      dropdown.classList.remove('show');
    };

    dropdown.appendChild(item);
  });
}

renderList(pasaranList);

// search filter
searchInput.addEventListener('input', () => {
  const keyword = searchInput.value.toLowerCase();
  const filtered = pasaranList.filter(p => p.toLowerCase().includes(keyword));
  renderList(filtered);
  dropdown.classList.add('show');
});

// dropdown toggle
selectedEl.onclick = () => {
  dropdown.classList.toggle('show');
};

// show caption
function showCaption(pasaran){
  const text = `𝐖𝐈𝐍𝐍𝐈𝐍𝐆 𝐍𝐔𝐌𝐁𝐄𝐑
PASARAN : ${pasaran}
SAH >> 
==========================
#juaratogel #juaratogellogin
#resultjuaratogel`;

  resultBox.textContent = text;
  copyBtn.style.display = 'block';
}

// copy + next (URUT, TIDAK RANDOM)
copyBtn.onclick = () => {
  if(currentIndex === -1) return;

  navigator.clipboard.writeText(resultBox.textContent).then(()=>{
    statusDiv.textContent = "✅ Copied!";

    if(currentIndex < pasaranList.length - 1){
      currentIndex++;
      const next = pasaranList[currentIndex];
      selectedEl.textContent = next + " ▼";
      showCaption(next);
    } else {
      statusDiv.textContent = "✅ Semua selesai!";
      copyBtn.style.display = 'none';
    }

    setTimeout(()=> statusDiv.textContent='',1500);
  });
};

// klik luar
document.addEventListener('click',(e)=>{
  if(!e.target.closest('.select-box') && !e.target.closest('.search-box')){
    dropdown.classList.remove('show');
  }
});
</script>

</body>
</html>
