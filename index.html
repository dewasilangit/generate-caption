<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Winning Number Caption - JuaraTogel</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0a0a1f, #1a1a35);
      color: #fff;
      min-height: 100vh;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      max-width: 620px;
      width: 100%;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(16px);
      border-radius: 24px;
      padding: 32px 28px;
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    h1 {
      text-align: center;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 28px;
      background: linear-gradient(90deg, #c026d3, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .select-box {
      position: relative;
      margin-bottom: 30px;
    }

    .selected {
      padding: 18px 24px;
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(192, 38, 211, 0.3);
      border-radius: 16px;
      font-size: 17px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(192, 38, 211, 0.15);
    }

    .selected:hover {
      border-color: #c026d3;
      box-shadow: 0 8px 25px rgba(192, 38, 211, 0.3);
      transform: translateY(-2px);
    }

    .selected::after {
      content: "▼";
      font-size: 18px;
      transition: 0.3s;
    }

    .dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      margin-top: 10px;
      background: rgba(20, 20, 35, 0.98);
      border: 1px solid rgba(192, 38, 211, 0.4);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s ease;
      z-index: 100;
    }

    .dropdown.show {
      opacity: 1;
      transform: translateY(0);
    }

    .search-input {
      width: 100%;
      padding: 16px 20px;
      background: rgba(255,255,255,0.1);
      border: none;
      border-bottom: 1px solid rgba(255,255,255,0.15);
      color: white;
      font-size: 16px;
      outline: none;
    }

    .search-input::placeholder {
      color: #aaa;
    }

    .pasaran-item {
      padding: 14px 22px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 15.5px;
    }

    .pasaran-item:hover {
      background: #c026d3;
      padding-left: 28px;
    }

    .result-box {
      background: rgba(0, 0, 0, 0.45);
      border-radius: 16px;
      padding: 24px;
      font-size: 18px;
      line-height: 1.85;
      min-height: 210px;
      margin-bottom: 20px;
      white-space: pre-line;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: inset 0 4px 12px rgba(0,0,0,0.3);
    }

    .copy-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(90deg, #c026d3, #ec4899);
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 8px 20px rgba(192, 38, 211, 0.4);
    }

    .copy-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 28px rgba(192, 38, 211, 0.5);
    }

    .info {
      text-align: center;
      margin-top: 12px;
      font-size: 14px;
      color: #c026d3;
      font-weight: 500;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Winning Number Caption</h1>

    <div class="select-box">
      <div class="selected" id="selectedPasaran">
        Pilih Pasaran ▼
      </div>
      <div class="dropdown" id="dropdown">
        <input type="text" class="search-input" id="searchInput" placeholder="Cari pasaran...">
        <div id="pasaranContainer"></div>
      </div>
    </div>

    <div class="result-box" id="result">
      Silakan pilih pasaran terlebih dahulu
    </div>

    <button class="copy-btn" id="copyBtn" style="display: none;">
      📋 Copy & Next Pasaran
    </button>

    <div class="info" id="status"></div>
  </div>

  <script>
    const pasaranList = [
      "KENTUCKY MID", "ROMA", "FLORIDA MID", "MONACO", "NEWYORK MID",
      "TURIN", "ITALY", "CAROLINA DAY", "CUBA", "FRANCE",
      "MADRID", "OREGON 03", "BULGARIA", "HUNGARY", "MIAMI",
      "OREGON 06", "CALIFORNIA", "FLORIDA EVE", "OREGON 09", "NEWYORK EVE",
      "KENTUCKY EVE", "CAROLINA EVE", "ECUADOR", "AUSTRIA", "CAMBODIA",
      "FOSHAN", "OREGON 12", "BULLSEYE", "CHILE", "LAOS",
      "TTM 4D-P1", "SYDNEY", "CHENGDU", "GUANGDONG", "TTM 5D-P1",
      "CHINA", "CHONGQING", "TTM 4D-P2", "PHILIPPINES", "KINGKONG P1",
      "JAPAN", "KOWLOON", "SINGAPORE", "JEJU LOTTO", "TOTO BEIJING",
      "TTM 4D-P3", "TOTO FUZHOU", "CYPRUS", "TAIWAN", "TAICHUNG",
      "MEXICO", "TTM 5D-P2", "ICELAND", "OSLO", "TTM 4D-P4",
      "BHUTAN", "HAITI", "HONGKONG", "TTM 4D-P5", "KINGKONG P2",
      "DENVER", "TORONTO", "TTM 4D-P6"
    ];

    const selectedEl = document.getElementById('selectedPasaran');
    const dropdown = document.getElementById('dropdown');
    const searchInput = document.getElementById('searchInput');
    const pasaranContainer = document.getElementById('pasaranContainer');
    const resultBox = document.getElementById('result');
    const copyBtn = document.getElementById('copyBtn');
    const statusDiv = document.getElementById('status');

    let currentIndex = -1;

    // Render daftar pasaran
    function renderPasaran(filteredList) {
      pasaranContainer.innerHTML = '';
      filteredList.forEach((pasaran, index) => {
        const item = document.createElement('div');
        item.className = 'pasaran-item';
        item.textContent = pasaran;
        item.addEventListener('click', () => {
          currentIndex = pasaranList.indexOf(pasaran);
          selectedEl.textContent = pasaran + " ▼";
          showCaption(pasaran);
          dropdown.classList.remove('show');
          searchInput.value = '';
        });
        pasaranContainer.appendChild(item);
      });
    }

    // Tampilkan caption
    function showCaption(pasaran) {
      const caption = `𝐖𝐈𝐍𝐍𝐈𝐍𝐆 𝐍𝐔𝐌𝐁𝐄𝐑
PASARAN : ${pasaran}
SAH >>
==========================
#juaratogel #juaratogellogin
#resultjuaratogel`;

      resultBox.textContent = caption;
      copyBtn.style.display = 'block';
    }

    // Search functionality
    searchInput.addEventListener('input', () => {
      const query = searchInput.value.toUpperCase().trim();
      const filtered = pasaranList.filter(p => p.includes(query));
      renderPasaran(filtered);
    });

    // Toggle dropdown
    selectedEl.addEventListener('click', () => {
      dropdown.classList.toggle('show');
      if (dropdown.classList.contains('show')) {
        searchInput.focus();
        renderPasaran(pasaranList); // tampilkan semua saat dibuka
      }
    });

    // Copy & Next
    copyBtn.addEventListener('click', () => {
      if (currentIndex === -1) return;

      const textToCopy = resultBox.textContent;
      navigator.clipboard.writeText(textToCopy).then(() => {
        statusDiv.textContent = '✅ Copied!';

        if (currentIndex < pasaranList.length - 1) {
          currentIndex++;
          const nextPasaran = pasaranList[currentIndex];
          selectedEl.textContent = nextPasaran + " ▼";
          showCaption(nextPasaran);
        } else {
          statusDiv.textContent = '✅ Semua pasaran sudah selesai!';
          copyBtn.style.display = 'none';
        }

        setTimeout(() => statusDiv.textContent = '', 2000);
      });
    });

    // Tutup dropdown kalau klik di luar
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.select-box')) {
        dropdown.classList.remove('show');
      }
    });
  </script>
</body>
</html>
