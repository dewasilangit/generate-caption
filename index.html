<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Winning Number - JuaraTogel</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f0f23, #1a1a2e);
      color: #fff;
      min-height: 100vh;
      padding: 15px;
    }

    .container {
      max-width: 620px;
      margin: 0 auto;
      background: rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 25px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    h1 {
      text-align: center;
      font-size: 26px;
      margin-bottom: 25px;
      background: linear-gradient(90deg, #a855f7, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .pasaran-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 8px;
      margin-bottom: 30px;
    }

    .pasaran-btn {
      padding: 12px 10px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      text-align: center;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .pasaran-btn:hover {
      background: #a855f7;
      border-color: #a855f7;
    }

    .pasaran-btn.active {
      background: #a855f7;
      border-color: #a855f7;
      font-weight: 600;
    }

    .result-box {
      background: rgba(0,0,0,0.4);
      border-radius: 12px;
      padding: 20px;
      font-size: 17.5px;
      line-height: 1.75;
      min-height: 180px;
      margin-bottom: 15px;
      white-space: pre-line;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .copy-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(90deg, #a855f7, #ec4899);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 10px;
    }

    .copy-btn:hover {
      opacity: 0.9;
    }

    .info {
      text-align: center;
      font-size: 14px;
      color: #a1a1aa;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Winning Number Caption</h1>

    <div class="pasaran-list" id="pasaranList"></div>

    <div class="result-box" id="result">
      Klik salah satu pasaran di atas
    </div>

    <button class="copy-btn" id="copyBtn" style="display: none;">
      📋 Copy & Next Pasaran
    </button>

    <div class="info" id="status"></div>
  </div>

  <script>
    const pasaranList = [
      "KENTUCKY MID", "ROMA", "FLORIDA MID", "MONACO", "NEWYORK MID",
      "TURIN", "ITALY", "CAROLINA DAY", "CUBA", "FRANCE",
      "MADRID", "OREGON 03", "BULGARIA", "HUNGARY", "MIAMI",
      "OREGON 06", "CALIFORNIA", "FLORIDA EVE", "OREGON 09", "NEWYORK EVE",
      "KENTUCKY EVE", "CAROLINA EVE", "ECUADOR", "AUSTRIA", "CAMBODIA",
      "FOSHAN", "OREGON 12", "BULLSEYE", "CHILE", "LAOS",
      "TTM 4D-P1", "SYDNEY", "CHENGDU", "GUANGDONG", "TTM 5D-P1",
      "CHINA", "CHONGQING", "TTM 4D-P2", "PHILIPPINES", "KINGKONG P1",
      "JAPAN", "KOWLOON", "SINGAPORE", "JEJU LOTTO", "TOTO BEIJING",
      "TTM 4D-P3", "TOTO FUZHOU", "CYPRUS", "TAIWAN", "TAICHUNG",
      "MEXICO", "TTM 5D-P2", "ICELAND", "OSLO", "TTM 4D-P4",
      "BHUTAN", "HAITI", "HONGKONG", "TTM 4D-P5", "KINGKONG P2",
      "DENVER", "TORONTO", "TTM 4D-P6"
    ];

    const pasaranContainer = document.getElementById('pasaranList');
    const resultBox = document.getElementById('result');
    const copyBtn = document.getElementById('copyBtn');
    const statusDiv = document.getElementById('status');

    let currentIndex = -1;

    // Buat daftar pasaran
    pasaranList.forEach((pasaran, index) => {
      const btn = document.createElement('div');
      btn.className = 'pasaran-btn';
      btn.textContent = pasaran;
      btn.addEventListener('click', () => {
        currentIndex = index;
        showCaption(pasaran);
      });
      pasaranContainer.appendChild(btn);
    });

    function showCaption(pasaran) {
      const caption = `𝐖𝐈𝐍𝐍𝐈𝐍𝐆 𝐍𝐔𝐌𝐁𝐄𝐑
PASARAN : ${pasaran}
SAH >>
==========================
#juaratogel #juaratogellogin
#resultjuaratogel`;

      resultBox.textContent = caption;
      copyBtn.style.display = 'block';
    }

    // Tombol Copy + Auto Next
    copyBtn.addEventListener('click', () => {
      if (currentIndex === -1) return;

      const currentPasaran = pasaranList[currentIndex];
      const textToCopy = resultBox.textContent;

      navigator.clipboard.writeText(textToCopy).then(() => {
        statusDiv.textContent = `✅ Copied: ${currentPasaran}`;

        // Auto next ke pasaran berikutnya
        if (currentIndex < pasaranList.length - 1) {
          currentIndex++;
          const nextPasaran = pasaranList[currentIndex];
          showCaption(nextPasaran);

          // Highlight tombol aktif
          document.querySelectorAll('.pasaran-btn').forEach((btn, i) => {
            btn.classList.toggle('active', i === currentIndex);
          });
        } else {
          statusDiv.textContent = '✅ Semua pasaran sudah selesai!';
          copyBtn.style.display = 'none';
        }

        // Hilangkan status setelah 2 detik
        setTimeout(() => {
          statusDiv.textContent = '';
        }, 2000);
      });
    });
  </script>
</body>
</html>
