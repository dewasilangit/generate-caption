<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Winning Number Caption - JuaraTogel</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f0f23, #1a1a2e);
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
    .sidebar {
      flex: 1;
      min-width: 280px;
      background: rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 20px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .main {
      flex: 2;
      min-width: 320px;
      background: rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 30px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    h1 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 28px;
      background: linear-gradient(90deg, #a855f7, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .pasaran-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
    }
    .pasaran-btn {
      padding: 14px 12px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      text-align: center;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.3s;
    }
    .pasaran-btn:hover, .pasaran-btn.active {
      background: #a855f7;
      border-color: #a855f7;
      transform: translateY(-2px);
    }
    .result {
      background: rgba(0,0,0,0.3);
      border-radius: 16px;
      padding: 25px;
      font-size: 18px;
      line-height: 1.8;
      min-height: 280px;
      white-space: pre-line;
    }
    .copy-btn {
      margin-top: 20px;
      width: 100%;
      padding: 16px;
      background: linear-gradient(90deg, #a855f7, #ec4899);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
    }
    .copy-btn:hover {
      opacity: 0.9;
    }
    .status {
      text-align: center;
      margin-top: 15px;
      color: #22c55e;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <h1>Winning Number Caption Generator</h1>
  
  <div class="container">
    <!-- Daftar Pasaran -->
    <div class="sidebar">
      <h2 style="margin-bottom:15px; text-align:center;">Daftar Pasaran</h2>
      <div class="pasaran-list" id="pasaranList"></div>
    </div>

    <!-- Hasil Caption -->
    <div class="main">
      <h2 style="margin-bottom:20px; text-align:center;">Preview Caption</h2>
      <div class="result" id="result">
        Klik salah satu pasaran di sebelah kiri untuk generate caption
      </div>
      <button class="copy-btn" id="copyBtn" style="display:none;">📋 Copy Caption</button>
      <div class="status" id="status"></div>
    </div>
  </div>

  <script>
    const pasaranList = [
      "KENTUCKY MID", "ROMA", "FLORIDA MID", "MONACO", "NEWYORK MID",
      "TURIN", "ITALY", "CAROLINA DAY", "CUBA", "FRANCE",
      "MADRID", "OREGON 03", "BULGARIA", "HUNGARY", "MIAMI",
      "OREGON 06", "CALIFORNIA", "FLORIDA EVE", "OREGON 09", "NEWYORK EVE",
      "KENTUCKY EVE", "CAROLINA EVE", "ECUADOR", "AUSTRIA", "CAMBODIA",
      "FOSHAN", "OREGON 12", "BULLSEYE", "CHILE", "LAOS",
      "TTM 4D-P1", "SYDNEY", "CHENGDU", "GUANGDONG", "TTM 5D-P1",
      "CHINA", "CHONGQING", "TTM 4D-P2", "PHILIPPINES", "KINGKONG P1",
      "JAPAN", "KOWLOON", "SINGAPORE", "JEJU LOTTO", "TOTO BEIJING",
      "TTM 4D-P3", "TOTO FUZHOU", "CYPRUS", "TAIWAN", "TAICHUNG",
      "MEXICO", "TTM 5D-P2", "ICELAND", "OSLO", "TTM 4D-P4",
      "BHUTAN", "HAITI", "HONGKONG", "TTM 4D-P5", "KINGKONG P2",
      "DENVER", "TORONTO", "TTM 4D-P6"
    ];

    const pasaranContainer = document.getElementById('pasaranList');
    const resultDiv = document.getElementById('result');
    const copyBtn = document.getElementById('copyBtn');
    const statusDiv = document.getElementById('status');

    let currentPasaran = '';

    // Buat tombol pasaran
    pasaranList.forEach(pasaran => {
      const btn = document.createElement('div');
      btn.className = 'pasaran-btn';
      btn.textContent = pasaran;
      btn.addEventListener('click', () => {
        currentPasaran = pasaran;
        
        // Highlight tombol aktif
        document.querySelectorAll('.pasaran-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // Generate teks
        const text = `𝐖𝐈𝐍𝐍𝐈𝐍𝐆 𝐍𝐔𝐌𝐁𝐄𝐑
PASARAN : ${pasaran}
SAH >>
==========================
#juaratogel #juaratogellogin
#resultjuaratogel`;

        resultDiv.textContent = text;
        copyBtn.style.display = 'block';
      });
      pasaranContainer.appendChild(btn);
    });

    // Tombol Copy
    copyBtn.addEventListener('click', () => {
      if (!currentPasaran) return;
      
      const textToCopy = resultDiv.textContent;
      navigator.clipboard.writeText(textToCopy).then(() => {
        statusDiv.textContent = '✅ Caption berhasil dicopy!';
        setTimeout(() => {
          statusDiv.textContent = '';
        }, 2500);
      });
    });
  </script>
</body>
</html>
